name: Dynamic Release Automation 🚀

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: windows-latest

    permissions:
      contents: write # 授予 GitHub Actions 上传 Release 文件的权限

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      # ----------------------------------------------------
      # 1. 环境配置与检测
      # ----------------------------------------------------
      - name: 🔍 Get Package Manager
        id: get_config
        shell: bash
        run: |
          # 从 package.json 读取包管理器配置
          PACKAGE_MANAGER=$(jq -r '.ciConfig.packageManager' package.json)
          echo "PACKAGE_MANAGER=$PACKAGE_MANAGER" >> $GITHUB_ENV

      - name: 🛠️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ⚙️ Enable Corepack
        if: ${{ env.PACKAGE_MANAGER == 'pnpm' }}
        shell: bash
        run: corepack enable pnpm

      # ----------------------------------------------------
      # 2. 依赖缓存与安装
      # ----------------------------------------------------
      - name: 📥 Cache dependencies
        uses: actions/cache@v4
        if: ${{ env.PACKAGE_MANAGER == 'pnpm' }}
        with:
          path: ~\AppData\Local\pnpm\store\v3
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 📦 Install Dependencies
        shell: powershell
        run: |
          # 根据配置安装依赖
          if ("${{ env.PACKAGE_MANAGER }}" -eq "pnpm") {
            pnpm install --frozen-lockfile --store-dir "$env:AppData\Local\pnpm\store\v3"
          } elseif ("${{ env.PACKAGE_MANAGER }}" -eq "npm") {
            npm install
          }

      # ----------------------------------------------------
      # 3. 执行构建与发布流程
      # ----------------------------------------------------
      - name: 🚀 Build and Publish
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 直接调用 package.json 定义的 dist 脚本
          # electron-builder 会自动读取 package.json 中的 publish 配置
          # 并根据当前的 git tag 自动执行发布操作
          
          if ("${{ env.PACKAGE_MANAGER }}" -eq "pnpm") {
            pnpm run dist
          } elseif ("${{ env.PACKAGE_MANAGER }}" -eq "npm") {
            npm run dist
          } else {
            Write-Error "Unknown package manager configured in ciConfig"
            exit 1
          }