name: Build and Release

# 触发机制：当推送以 'v' 开头的标签时触发 (如 v2.0.1)
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest # 必须用 Windows 环境打包 exe
    
    # 必须给予写权限，否则无法上传 Release
    permissions:
      contents: write

    steps:
      # 1. 拉取代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 安装 pnpm (因为你的脚本里用了 pnpm)
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      # 3. 配置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      # 4. 安装依赖
      - name: Install Dependencies
        run: pnpm install

      # 5. 构建代码 (对应 package.json 里的 "build": "tsc && vite build")
      - name: Build Source
        run: pnpm run build

      # 6. 打包并发布到 GitHub Release
      # 这里我们不直接用 npm run dist，而是手动运行 electron-builder
      # 加上 --publish always 参数，强制它执行上传操作
      - name: Package and Publish
        run: npx electron-builder --win --publish always
        env:
          # 这个 Token 是 GitHub 自动提供的，不需要你手动设置
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}